<!DOCTYPE html>
<html>
<head>
    <title>PassIt WebAssembly</title>
    <meta charset="utf-8">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }
        #canvas { 
            border: none; 
            background-color: black; 
            display: block;
            width: 100vw;
            height: 56.25vw; /* 16:9 aspect ratio */
            max-height: 100vh;
        }
        /* If height is the limiting factor, scale by height instead */
        @media (max-aspect-ratio: 16/9) {
            #canvas {
                width: 177.78vh; /* 16:9 aspect ratio */
                height: 100vh;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="1920" height="1080"></canvas>
    
    <script>
        var Module = {
            canvas: document.getElementById('canvas')
        };
    </script>
    <script src="main.js"></script>
</body>
</html>
